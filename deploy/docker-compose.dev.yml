services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: flint
      POSTGRES_USER: flint
      POSTGRES_PASSWORD: flintdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flint"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
